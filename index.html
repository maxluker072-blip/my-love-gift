<!DOCTYPE html><html lang="my">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>I Love You</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #ffd6e7, #ffeef5);
  overflow: hidden;
}

.card {
  width: 320px;
  background: white;
  border-radius: 25px;
  padding: 25px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  position: relative;
  z-index: 2;
}

h1 {
  color: #ff4f87;
  margin-bottom: 15px;
  font-size: 32px;
}

.text {
  color: #555;
  margin-bottom: 20px;
  font-size: 18px;
}

.emoji {
  font-size: 80px;
  margin-bottom: 20px;
  animation: bounce 1.5s infinite;
}

button {
  background: #ff6fa1;
  border: none;
  padding: 12px 25px;
  border-radius: 30px;
  color: white;
  font-size: 18px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #ff3f7f;
  transform: scale(1.05);
}

.message {
  margin-top: 15px;
  color: #ff4f87;
  font-size: 20px;
  display: none;
}

.heart {
  position: absolute;
  color: #ff6fa1;
  font-size: 20px;
  animation: float 6s linear infinite;
  opacity: 0.7;
}

@keyframes float {
  0% {
    transform: translateY(100vh) scale(0.5);
  }
  100% {
    transform: translateY(-120px) scale(1.2);
  }
}

@keyframes bounce {
  0%, 100% {
    transform: translateY(0);
  }
  50% {
    transform: translateY(-10px);
  }
}

  </style>
</head>
<body>  <div class="card">
    <h1>I Love You ❤️</h1>
    <p class="text">မင်းကိုအရမ်းချစ်တယ် 🥺</p>
    <div class="emoji">🐻💖🐼</div><button onclick="showMessage()">နှိပ်ပါ 💌</button>

<div class="message" id="msg">
  Forever Together 💞
</div>

  </div>  <script>
    function showMessage() {
      document.getElementById('msg').style.display = 'block';
    }

    function createHeart() {
      const heart = document.createElement('div');
      heart.classList.add('heart');
      heart.innerHTML = '💖';
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.fontSize = Math.random() * 20 + 15 + 'px';
      heart.style.animationDuration = Math.random() * 3 + 3 + 's';
      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 6000);
    }

    setInterval(createHeart, 300);
  </script></body>
</html>
